<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>着姿シミュレーター</title>
<style>
  :root{
    --ink:#2b2622;
    --sumi:#161311;
    --washi:#f7f4ee;
    --kincha:#8a6a3d;
    --line:#ded7cb;
    --shu:#a5442f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--washi);
    color:var(--ink);
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    line-height:1.7;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:32px 20px 80px}

  header{border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:32px}
  h1{font-size:22px;font-weight:400;letter-spacing:.18em}
  header p{font-size:13px;color:#786d61;margin-top:6px;letter-spacing:.05em}

  .layout{display:grid;grid-template-columns:1fr 380px;gap:40px;align-items:start}

  /* 選択エリア */
  .step{margin-bottom:36px}
  .step[data-locked="true"]{opacity:.35;pointer-events:none}
  .step-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
  .step-num{
    font-family:"Yu Gothic",sans-serif;font-size:11px;letter-spacing:.2em;
    color:var(--kincha);border:1px solid var(--kincha);
    padding:2px 8px;border-radius:2px;
  }
  .step-head h2{font-size:16px;font-weight:400;letter-spacing:.1em}
  .step-head .hint{font-size:12px;color:#9a9188;margin-left:auto}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}
  .swatch{
    border:1px solid var(--line);background:#fff;padding:0;cursor:pointer;
    border-radius:2px;overflow:hidden;transition:.15s;
  }
  .swatch:hover{border-color:var(--kincha)}
  .swatch:focus-visible{outline:2px solid var(--shu);outline-offset:2px}
  .swatch[aria-pressed="true"]{border-color:var(--sumi);box-shadow:0 0 0 2px var(--sumi)}
  .swatch:disabled{opacity:.3;cursor:default}
  .swatch:disabled:hover{border-color:var(--line)}
  .swatch img{width:100%;aspect-ratio:1/1.35;object-fit:cover;display:block;background:#eae5dc}
  .swatch .name{
    display:block;font-size:11px;padding:6px 4px;text-align:center;
    letter-spacing:.04em;color:#5c534b;border-top:1px solid var(--line);
  }
  .swatch[data-kind="obi"] img{aspect-ratio:1/0.6}

  /* プレビュー */
  .preview{position:sticky;top:24px}
  .stage{
    border:1px solid var(--line);background:#fff;
    aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;
    overflow:hidden;position:relative;
  }
  .stage img{width:100%;height:100%;object-fit:contain;display:block}
  .empty{color:#b3aaa0;font-size:13px;letter-spacing:.1em;text-align:center;padding:0 24px}

  .caption{margin-top:14px;font-size:13px;min-height:3.4em}
  .caption dl{display:grid;grid-template-columns:4em 1fr;gap:4px 12px}
  .caption dt{color:#9a9188;font-size:12px;letter-spacing:.1em}
  .caption dd{color:var(--ink)}
  .caption .none{color:#b3aaa0}

  .reset{
    margin-top:20px;width:100%;background:none;border:1px solid var(--line);
    padding:11px;font-family:inherit;font-size:13px;letter-spacing:.1em;
    color:#786d61;cursor:pointer;border-radius:2px;transition:.15s;
  }
  .reset:hover{border-color:var(--sumi);color:var(--sumi)}
  .reset:disabled{opacity:.4;cursor:default}

  @media(max-width:820px){
    .layout{grid-template-columns:1fr;gap:32px}
    .preview{position:static;order:-1}
    .stage{aspect-ratio:4/5}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>着姿シミュレーター</h1>
    <p>反物と帯を選ぶと、仕立て上がりの着姿をご覧いただけます。</p>
  </header>

  <div class="layout">

    <div>
      <section class="step" id="step-tanmono">
        <div class="step-head">
          <span class="step-num">反 物</span>
          <h2>生地を選ぶ</h2>
          <span class="hint">1枚選択</span>
        </div>
        <div class="grid" id="tanmono-grid"></div>
      </section>

      <section class="step" id="step-obi" data-locked="true">
        <div class="step-head">
          <span class="step-num">帯</span>
          <h2>帯を合わせる</h2>
          <span class="hint" id="obi-hint">反物を選ぶと表示されます</span>
        </div>
        <div class="grid" id="obi-grid"></div>
      </section>
    </div>

    <aside class="preview">
      <div class="stage" id="stage">
        <p class="empty">反物を選んでください</p>
      </div>
      <div class="caption">
        <dl>
          <dt>反物</dt><dd id="cap-tanmono" class="none">未選択</dd>
          <dt>帯</dt><dd id="cap-obi" class="none">未選択</dd>
        </dl>
      </div>
      <button class="reset" id="reset" disabled>選び直す</button>
    </aside>

  </div>
</div>

<script>
/* ============================================================
   ここだけ編集すれば反物・帯を追加できます
   ------------------------------------------------------------
   反物IDは t01, t02, t03 … / 帯IDは o01, o02 … と振ってください
   画像は images/ の中に、IDと同じ名前で置きます
   ============================================================ */

const TANMONO = [
  { id:"t01", name:"緑 橘" },
  { id:"t02", name:"赤 宝づくし" },
  { id:"t03", name:"青 鞠" },
  { id:"t04", name:"水色 花丸 雪輪"},
  { id:"t05", name:"紅白 花丸"},
  { id:"t06", name:"ピンク 鞠"},
  { id:"t07", name:"赤 花籠"},
  { id:"t08", name:"紺 狂言丸"},
];

const OBI = [
  { id:"o01", name:"水色 花丸"  },
  { id:"o02", name:"黄色 梅づくし" },
  { id:"o03", name:"緑 手毬" },
  { id:"o04", name:"黒 手毬" },
];

/* 組み合わせ着姿がまだ撮れていない組み合わせをここに書くと、
   その帯は「準備中」としてグレー表示になります（押せません）。
   例: ["t02_o03", "t02_o04"]                                    */
const NOT_READY = [];

/* 画像ファイルの拡張子。png なら "png" に変える */
const EXT = "jpg";

/* ============================================================
   ここから下は編集不要
   ============================================================ */

const path = {
  tanmonoThumb: id => `images/tanmono/${id}.${EXT}`,
  obiThumb:     id => `images/obi/${id}.${EXT}`,
  kimono:       id => `images/kimono/${id}.${EXT}`,
  combo:  (t, o) => `images/combo/${t}_${o}.${EXT}`,
};

TANMONO.forEach(t => {
  t.thumb  = path.tanmonoThumb(t.id);
  t.kimono = path.kimono(t.id);
});
OBI.forEach(o => { o.thumb = path.obiThumb(o.id); });

const state = { tanmono:null, obi:null };

const $ = id => document.getElementById(id);
const stage = $("stage");
const stepObi = $("step-obi");

function makeSwatch(item, kind){
  const b = document.createElement("button");
  b.className = "swatch";
  b.type = "button";
  b.dataset.kind = kind;
  b.dataset.id = item.id;
  b.setAttribute("aria-pressed","false");
  b.innerHTML = `<img src="${item.thumb}" alt="${item.name}"><span class="name">${item.name}</span>`;
  b.addEventListener("click", () => select(kind, item));
  return b;
}

function select(kind, item){
  state[kind] = item;
  if (kind === "tanmono") state.obi = null;   // 反物を変えたら帯はリセット
  render();
}

function render(){
  // 押下状態
  document.querySelectorAll(".swatch").forEach(b => {
    const cur = state[b.dataset.kind];
    b.setAttribute("aria-pressed", String(!!cur && cur.id === b.dataset.id));
    if (b.dataset.kind === "obi" && state.tanmono){
      const missing = NOT_READY.includes(`${state.tanmono.id}_${b.dataset.id}`);
      b.disabled = missing;
      b.title = missing ? "この組み合わせは準備中です" : "";
    }
  });

  // 帯セクションの開閉
  const hasTanmono = !!state.tanmono;
  stepObi.dataset.locked = String(!hasTanmono);
  $("obi-hint").textContent = hasTanmono ? "1本選択" : "反物を選ぶと表示されます";

  // 画像
  let src = null;
  if (state.tanmono && state.obi){
    src = path.combo(state.tanmono.id, state.obi.id);
  } else if (state.tanmono){
    src = state.tanmono.kimono;
  }

  if (src){
    const alt = state.obi
      ? `$state.tanmono.nameの着物に$state.obi.nameの帯を合わせた着姿`
      : `$state.tanmono.nameの着物の着姿`;
    stage.innerHTML = `<img src="${src}" alt="${alt}">`;
  } else {
    stage.innerHTML = `<p class="empty">反物を選んでください</p>`;
  }

  // キャプション
  setCap("cap-tanmono", state.tanmono);
  setCap("cap-obi", state.obi);

  $("reset").disabled = !hasTanmono;
}

function setCap(id, item){
  const el = $(id);
  el.textContent = item ? item.name : "未選択";
  el.classList.toggle("none", !item);
}

$("reset").addEventListener("click", () => {
  state.tanmono = null;
  state.obi = null;
  render();
});

TANMONO.forEach(t => $("tanmono-grid").appendChild(makeSwatch(t,"tanmono")));
OBI.forEach(o => $("obi-grid").appendChild(makeSwatch(o,"obi")));
render();
</script>
</body>
</html>
